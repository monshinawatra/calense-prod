services:
  - type: web
    name: calense-prod
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx tsx server.ts
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
